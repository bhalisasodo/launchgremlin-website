<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LaunchGremlin Admin</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #f4f4f5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #09090b 0%, #18181b 100%);
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      .card {
        background: rgba(24, 24, 27, 0.9);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(0,0,0,0.25);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      input {
        flex: 1;
        min-width: 240px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #3f3f46;
        background: #09090b;
        color: white;
      }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        background: #10b981;
        color: #052e16;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #27272a;
        color: #f4f4f5;
      }
      .status {
        margin-top: 10px;
        color: #a7f3d0;
        min-height: 20px;
      }
      .status.error { color: #fda4af; }
      .lead-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }
      .lead-item {
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 14px;
        background: rgba(9,9,11,0.65);
      }
      .lead-item h3 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      .meta {
        color: #a1a1aa;
        font-size: 0.9rem;
        margin-bottom: 6px;
      }
      .summary {
        color: #e4e4e7;
        white-space: pre-wrap;
      }
      .empty {
        color: #a1a1aa;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="toolbar">
          <h1>LaunchGremlin Admin</h1>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input id="token" type="password" placeholder="Admin token" />
            <button id="loadBtn">Load leads</button>
            <button id="clearBtn" class="secondary">Clear</button>
          </div>
        </div>
        <div id="status" class="status">Enter your admin token and load the latest submissions.</div>
        <div id="leadList" class="lead-list"></div>
      </section>
    </main>

    <script>
      const tokenInput = document.getElementById('token');
      const leadList = document.getElementById('leadList');
      const statusEl = document.getElementById('status');

      const setStatus = (message, isError = false) => {
        statusEl.textContent = message;
        statusEl.classList.toggle('error', isError);
      };

      const renderLeads = (leads) => {
        if (!leads.length) {
          leadList.innerHTML = '<div class="empty">No leads yet.</div>';
          return;
        }

        leadList.innerHTML = leads.map((lead) => `
          <article class="lead-item">
            <h3>${escapeHtml(lead.name || 'Unnamed lead')}</h3>
            <div class="meta">${escapeHtml(lead.email || '—')} • ${escapeHtml(lead.company || '—')} • ${escapeHtml(lead.service || '—')}</div>
            <div class="meta">Status: ${escapeHtml(lead.status || 'new')} • ${escapeHtml(lead.created_at || '—')}</div>
            <div class="summary">${escapeHtml(lead.summary || 'No summary provided.')}</div>
          </article>
        `).join('');
      };

      const escapeHtml = (value) => String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

      const loadLeads = async () => {
        const token = tokenInput.value.trim();
        if (!token) {
          setStatus('Please enter the admin token.', true);
          return;
        }

        setStatus('Loading leads...');
        try {
          const response = await fetch('/api/leads', {
            headers: { 'x-admin-token': token },
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || 'Unable to load leads.');
          }
          renderLeads(data.leads || []);
          setStatus(`Loaded ${data.count || 0} lead(s).`);
        } catch (error) {
          setStatus(error.message, true);
        }
      };

      document.getElementById('loadBtn').addEventListener('click', loadLeads);
      document.getElementById('clearBtn').addEventListener('click', () => {
        tokenInput.value = '';
        leadList.innerHTML = '';
        setStatus('Token cleared.');
      });
    </script>
  </body>
</html>
